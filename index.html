<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html { scroll-behavior: smooth; }
      body { margin: 0; background: #f8fafc; color: #0f172a; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      #root { min-height: 100vh; }
    </style>
    <title>Your Brand Template</title>
    <meta
      name="description"
      content="A clean website and webshop template. Replace the branding, copy, metadata, and contact details with your own."
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Your Brand" />
    <meta property="og:title" content="Your Brand Template" />
    <meta
      property="og:description"
      content="A clean website and webshop template. Replace the branding, copy, metadata, and contact details with your own."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:site_name" content="Your Brand" />
    <meta property="og:locale" content="nl_NL" />
    <meta property="og:image" content="https://example.com/placeholder.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Brand Template" />
    <meta
      name="twitter:description"
      content="A clean website and webshop template. Replace the branding, copy, metadata, and contact details with your own."
    />
    <meta name="twitter:image" content="https://example.com/placeholder.svg" />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />
    <link rel="preload" as="image" href="/placeholder.svg" fetchpriority="high" />
    <link rel="preconnect" href="https://imagedelivery.net" crossorigin />
    <link rel="dns-prefetch" href="//imagedelivery.net" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
